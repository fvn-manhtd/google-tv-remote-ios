<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Google colors -->
    <linearGradient id="googleBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b9ef4"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    <linearGradient id="googleRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f06a5e"/>
      <stop offset="100%" stop-color="#ea4335"/>
    </linearGradient>
    <linearGradient id="googleYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#fbbc04"/>
    </linearGradient>
    <linearGradient id="googleGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ec879"/>
      <stop offset="100%" stop-color="#34a853"/>
    </linearGradient>

    <!-- Remote body gradient -->
    <linearGradient id="remoteBody" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="30%" stop-color="#2a2a38"/>
      <stop offset="70%" stop-color="#222230"/>
      <stop offset="100%" stop-color="#1a1a26"/>
    </linearGradient>

    <!-- D-pad ring -->
    <linearGradient id="dpadRing" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#444458"/>
      <stop offset="50%" stop-color="#333345"/>
      <stop offset="100%" stop-color="#2a2a3c"/>
    </linearGradient>

    <!-- Center button glow -->
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="60%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#3367d6"/>
    </radialGradient>

    <!-- Shadow for remote -->
    <filter id="remoteShadow" x="-25%" y="-15%" width="150%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="rgba(0,0,0,0.18)"/>
    </filter>

    <!-- Button glow -->
    <filter id="buttonGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <!-- iOS clip -->
    <clipPath id="iosClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iosClip)">
    <!-- White background -->
    <rect width="1024" height="1024" fill="#ffffff"/>

    <!-- Subtle warm tint at edges -->
    <rect width="1024" height="1024" fill="url(#edgeTint)" opacity="0"/>

    <!-- ===== REMOTE CONTROL - centered in upper portion ===== -->
    <g transform="translate(512, 340) scale(0.52) translate(-512, -500)" filter="url(#remoteShadow)">

      <!-- Remote body -->
      <rect x="312" y="115" width="400" height="770" rx="200" ry="200" fill="url(#remoteBody)"/>

      <!-- Remote edge highlight -->
      <rect x="312" y="115" width="400" height="770" rx="200" ry="200"
            fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

      <!-- D-pad outer ring -->
      <circle cx="512" cy="340" r="120" fill="url(#dpadRing)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <circle cx="512" cy="340" r="118" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>

      <!-- Direction arrows -->
      <polygon points="512,265 528,295 496,295" fill="rgba(255,255,255,0.3)"/>
      <polygon points="512,415 528,385 496,385" fill="rgba(255,255,255,0.3)"/>
      <polygon points="437,340 467,324 467,356" fill="rgba(255,255,255,0.3)"/>
      <polygon points="587,340 557,324 557,356" fill="rgba(255,255,255,0.3)"/>

      <!-- Center OK button -->
      <circle cx="512" cy="340" r="42" fill="url(#centerGlow)" filter="url(#buttonGlow)"/>
      <circle cx="512" cy="340" r="42" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="512" y="348" text-anchor="middle" fill="white" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
            font-size="24" font-weight="600" letter-spacing="2" opacity="0.95">OK</text>

      <!-- Google color dots -->
      <g transform="translate(512, 505)">
        <circle cx="-60" cy="0" r="14" fill="url(#googleBlue)" filter="url(#buttonGlow)"/>
        <circle cx="-20" cy="0" r="14" fill="url(#googleRed)" filter="url(#buttonGlow)"/>
        <circle cx="20" cy="0" r="14" fill="url(#googleYellow)" filter="url(#buttonGlow)"/>
        <circle cx="60" cy="0" r="14" fill="url(#googleGreen)" filter="url(#buttonGlow)"/>
      </g>

      <!-- Action buttons -->
      <g transform="translate(430, 580)">
        <circle r="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M-8,-8 L-8,8 L8,0 Z" transform="rotate(180)" fill="rgba(255,255,255,0.35)"/>
      </g>
      <g transform="translate(512, 580)">
        <circle r="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M-10,4 L-10,-3 L0,-10 L10,-3 L10,4 L3,4 L3,-1 L-3,-1 L-3,4 Z" fill="rgba(255,255,255,0.35)"/>
      </g>
      <g transform="translate(594, 580)">
        <circle r="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <g fill="rgba(255,255,255,0.35)">
          <rect x="-5" y="-10" width="10" height="14" rx="5"/>
          <path d="M-9,2 Q-9,11 0,11 Q9,11 9,2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
          <line x1="0" y1="11" x2="0" y2="15" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
        </g>
      </g>

      <!-- Volume pill -->
      <g transform="translate(420, 690)">
        <rect x="-22" y="-40" width="44" height="80" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <line x1="-8" y1="-20" x2="8" y2="-20" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="0" y1="-28" x2="0" y2="-12" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="-8" y1="20" x2="8" y2="20" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- Channel pill -->
      <g transform="translate(604, 690)">
        <rect x="-22" y="-40" width="44" height="80" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <polygon points="0,-26 10,-16 -10,-16" fill="rgba(255,255,255,0.35)"/>
        <polygon points="0,26 10,16 -10,16" fill="rgba(255,255,255,0.35)"/>
      </g>

      <!-- Power button -->
      <g transform="translate(512, 810)">
        <circle r="22" fill="rgba(234,67,53,0.15)" stroke="rgba(234,67,53,0.5)" stroke-width="1.5"/>
        <path d="M0,-10 L0,-4" stroke="rgba(234,67,53,0.8)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M-7,-6 A9,9 0 1,0 7,-6" stroke="rgba(234,67,53,0.8)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </g>
    </g>

    <!-- ===== TEXT ===== -->
    <!-- Line 1: "Google TV" -->
    <g transform="translate(512, 720)" filter="url(#textShadow)">
      <text text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
            font-size="140" font-weight="700" letter-spacing="-3">
        <tspan fill="#4285f4">G</tspan><tspan fill="#ea4335">o</tspan><tspan fill="#fbbc04">o</tspan><tspan fill="#4285f4">g</tspan><tspan fill="#34a853">l</tspan><tspan fill="#ea4335">e</tspan><tspan fill="#333333"> TV</tspan>
      </text>
    </g>

    <!-- Line 2: "Remote" -->
    <text x="512" y="870" text-anchor="middle" fill="#555555"
          font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
          font-size="140" font-weight="300" letter-spacing="18" filter="url(#textShadow)">Remote</text>
  </g>
</svg>
